version: '3.8'
services:
  web-prod-01:
    image: lscr.io/linuxserver/openssh-server:latest
    container_name: devops-web-01
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - USER_NAME=deployer
      - SUDO_ACCESS=true
      - PASSWORD_ACCESS=false
    volumes:
      - ./test_keys/id_ed25519.pub:/config/.ssh/authorized_keys:ro
    ports:
      - "2222:2222"
    restart: unless-stopped

  db-master:
    image: lscr.io/linuxserver/openssh-server:latest
    container_name: devops-db-01
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - USER_NAME=postgres
      - SUDO_ACCESS=true
      - PASSWORD_ACCESS=false
    volumes:
      - ./test_keys/id_ed25519.pub:/config/.ssh/authorized_keys:ro
    ports:
      - "2223:2222"
    restart: unless-stopped
