<!--
  WIDGET: before-after-architecture  (zero dependencies — inline SVG only, no JS)
  Use for: a side-by-side "Current vs Proposed" architecture change. Two panels, each a
  small box+arrow SVG. Highlight what changed:
    added   = green outline (#15803d) on bg #e9f6ee  (new component)
    removed = red dashed outline (#b91c1c) on bg #fdecec (dropped component)
    kept    = white fill + line outline (#e4e9f2)     (unchanged)
  How: copy the block. In each panel place boxes (hand-authored x/y) and connect with
  arrows; apply the added/removed styling to the changed boxes. The two panels are
  independent little diagrams — mirror positions where it aids the eye.
  Uses the same box+arrow primitives as c4-container-view. Prints fine (static SVG).
-->
<div class="ba" style="border:1px solid #e4e9f2;border-radius:12px;padding:24px 26px;background:#f6f8fc;">
  <h4 style="font-family:'Montserrat',sans-serif;font-size:15px;font-weight:700;margin:0 0 4px;color:#16203a;">FILL: title (e.g. "Moving to an event-driven ingest")</h4>
  <p style="font-size:13px;color:#5b6677;margin:0 0 14px;">FILL: what changes and why (one line).</p>

  <div style="display:flex;gap:18px;flex-wrap:wrap;">
    <!-- ============ CURRENT ============ -->
    <div style="flex:1 1 280px;min-width:260px;border:1px solid #e4e9f2;border-radius:10px;background:#fff;padding:12px 14px;">
      <div style="font-family:'Roboto Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:#5b6677;margin-bottom:6px;">Current</div>
      <svg viewBox="0 0 300 230" width="100%" role="img" aria-label="FILL: current architecture">
        <title>FILL: current architecture</title>
        <defs>
          <marker id="ba-arrow-a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#5b6677"/></marker>
        </defs>
        <g stroke="#5b6677" stroke-width="1.4" fill="none">
          <path d="M150,54 L150,86" marker-end="url(#ba-arrow-a)"/>
          <path d="M150,132 L150,164" marker-end="url(#ba-arrow-a)"/>
        </g>
        <!-- kept -->
        <rect x="70" y="20" width="160" height="34" rx="8" fill="#fff" stroke="#e4e9f2" stroke-width="1.6"/>
        <text x="150" y="41" text-anchor="middle" font-family="'Roboto',sans-serif" font-size="12" fill="#16203a">FILL: Client</text>
        <!-- removed (red dashed) -->
        <rect x="70" y="86" width="160" height="46" rx="8" fill="#fdecec" stroke="#b91c1c" stroke-width="1.6" stroke-dasharray="6 4"/>
        <text x="150" y="106" text-anchor="middle" font-family="'Roboto',sans-serif" font-size="12" fill="#b91c1c" font-weight="600">FILL: Sync poller</text>
        <text x="150" y="122" text-anchor="middle" font-family="'Roboto Mono',monospace" font-size="9.5" fill="#b91c1c">removed</text>
        <!-- kept -->
        <rect x="70" y="164" width="160" height="34" rx="8" fill="#fff" stroke="#e4e9f2" stroke-width="1.6"/>
        <text x="150" y="185" text-anchor="middle" font-family="'Roboto',sans-serif" font-size="12" fill="#16203a">FILL: Database</text>
      </svg>
    </div>

    <!-- ============ PROPOSED ============ -->
    <div style="flex:1 1 280px;min-width:260px;border:1px solid #e4e9f2;border-radius:10px;background:#fff;padding:12px 14px;">
      <div style="font-family:'Roboto Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:#15803d;margin-bottom:6px;">Proposed</div>
      <svg viewBox="0 0 300 230" width="100%" role="img" aria-label="FILL: proposed architecture">
        <title>FILL: proposed architecture</title>
        <defs>
          <marker id="ba-arrow-b" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#5b6677"/></marker>
        </defs>
        <g stroke="#5b6677" stroke-width="1.4" fill="none">
          <path d="M150,54 L150,86" marker-end="url(#ba-arrow-b)"/>
          <path d="M150,132 L150,164" marker-end="url(#ba-arrow-b)"/>
        </g>
        <!-- kept -->
        <rect x="70" y="20" width="160" height="34" rx="8" fill="#fff" stroke="#e4e9f2" stroke-width="1.6"/>
        <text x="150" y="41" text-anchor="middle" font-family="'Roboto',sans-serif" font-size="12" fill="#16203a">FILL: Client</text>
        <!-- added (green) -->
        <rect x="70" y="86" width="160" height="46" rx="8" fill="#e9f6ee" stroke="#15803d" stroke-width="1.8"/>
        <text x="150" y="106" text-anchor="middle" font-family="'Roboto',sans-serif" font-size="12" fill="#15803d" font-weight="600">FILL: Event bus</text>
        <text x="150" y="122" text-anchor="middle" font-family="'Roboto Mono',monospace" font-size="9.5" fill="#15803d">new</text>
        <!-- kept -->
        <rect x="70" y="164" width="160" height="34" rx="8" fill="#fff" stroke="#e4e9f2" stroke-width="1.6"/>
        <text x="150" y="185" text-anchor="middle" font-family="'Roboto',sans-serif" font-size="12" fill="#16203a">FILL: Database</text>
      </svg>
    </div>
  </div>

  <!-- legend -->
  <div style="display:flex;gap:18px;flex-wrap:wrap;font-family:'Roboto',sans-serif;font-size:12px;color:#16203a;margin-top:12px;">
    <span style="display:inline-flex;align-items:center;gap:6px;"><span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:#e9f6ee;border:1.8px solid #15803d;"></span>Added</span>
    <span style="display:inline-flex;align-items:center;gap:6px;"><span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:#fdecec;border:1.6px dashed #b91c1c;"></span>Removed</span>
    <span style="display:inline-flex;align-items:center;gap:6px;"><span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:#fff;border:1.6px solid #e4e9f2;"></span>Unchanged</span>
  </div>
</div>
