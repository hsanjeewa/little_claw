<!--
  WIDGET: annotated-diagram  (zero dependencies — inline SVG + HTML callout list)
  Use for: an architecture / system / mechanism drawing with numbered callouts
  (the "truss under applied loads" pattern — a picture plus what each part means).
  How: copy the block, draw your shapes in the <svg>, add a numbered marker per
  callout, and write the matching explanation in the ordered list below.
  Keep shapes simple (rects, lines, paths). Palette matches the briefing template.
-->
<div class="ad" style="border:1px solid #e4e9f2;border-radius:12px;padding:24px 26px;background:#fff;">
  <h4 style="font-family:'Montserrat',sans-serif;font-size:15px;font-weight:700;margin:0 0 16px;color:#16203a;">FILL: diagram title</h4>
  <svg viewBox="0 0 620 220" width="100%" role="img" aria-label="FILL: describe the diagram for screen readers">
    <title>FILL: annotated diagram</title>
    <!-- === your drawing (replace) === -->
    <rect x="60" y="90" width="140" height="50" rx="4" fill="#eef1f6" stroke="#475569"/>
    <text x="130" y="120" text-anchor="middle" font-family="'Roboto',sans-serif" font-size="12" fill="#16203a">FILL: part 1</text>
    <line x1="200" y1="115" x2="330" y2="115" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/>
    <rect x="330" y="90" width="140" height="50" rx="4" fill="#eef1f6" stroke="#475569"/>
    <text x="400" y="120" text-anchor="middle" font-family="'Roboto',sans-serif" font-size="12" fill="#16203a">FILL: part 2</text>
    <defs><marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#2563eb"/></marker></defs>
    <!-- === numbered callout markers (position over the drawing) === -->
    <g font-family="'Roboto Mono',monospace" font-size="11" font-weight="600">
      <circle cx="130" cy="70" r="11" fill="#2563eb"/><text x="130" y="74" text-anchor="middle" fill="#fff">1</text>
      <circle cx="400" cy="70" r="11" fill="#2563eb"/><text x="400" y="74" text-anchor="middle" fill="#fff">2</text>
    </g>
  </svg>
  <ol style="margin:14px 0 0;padding-left:0;list-style:none;counter-reset:c;">
    <li style="counter-increment:c;position:relative;padding-left:30px;margin-bottom:9px;font-size:13.5px;color:#283449;line-height:1.5;">
      <span style="position:absolute;left:0;top:0;font-family:'Roboto Mono',monospace;font-size:11px;font-weight:600;color:#fff;background:#2563eb;width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;">1</span>
      <b>FILL: callout 1 label.</b> FILL: what it is / why it matters.
    </li>
    <li style="counter-increment:c;position:relative;padding-left:30px;margin-bottom:0;font-size:13.5px;color:#283449;line-height:1.5;">
      <span style="position:absolute;left:0;top:0;font-family:'Roboto Mono',monospace;font-size:11px;font-weight:600;color:#fff;background:#2563eb;width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;">2</span>
      <b>FILL: callout 2 label.</b> FILL: explanation.
    </li>
  </ol>
</div>
