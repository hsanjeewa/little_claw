<!--
  WIDGET: team-topologies-map  (zero dependencies — inline SVG, HAND-PLACED coordinates)
  Use for: mapping an org onto the four Team Topologies team types and the three
  interaction modes. Concept & vocabulary from Matthew Skelton & Manuel Pais,
  "Team Topologies" (IT Revolution, 2019) — https://teamtopologies.com. This is a
  neutral visual encoding, not an endorsement or the authors' own artwork.

  Team types (shape + color, matching the book's conventions):
     stream-aligned        = wide blue bar
     platform              = tall blue-dark block underneath
     enabling              = green rounded box
     complicated-subsystem = amber octagon-ish box
  Interaction modes (connector line style):
     collaboration    = thick solid  (two teams working closely, blurred boundary)
     X-as-a-Service   = thin arrow   (one consumes what the other provides)
     facilitating     = dashed       (enabling team coaching another)
  How: copy the block; move boxes + redraw connectors by hand for your org.
  Prints fine (static SVG). No CDN.
-->
<div class="ttm" style="border:1px solid #e4e9f2;border-radius:12px;padding:24px 26px;background:#f6f8fc;">
  <h4 style="font-family:'Montserrat',sans-serif;font-size:15px;font-weight:700;margin:0 0 4px;color:#16203a;">FILL: title (e.g. "Team interaction map")</h4>
  <p style="font-size:13px;color:#5b6677;margin:0 0 16px;">FILL: framing. Types &amp; modes per Skelton &amp; Pais, <em>Team Topologies</em> (2019).</p>

  <svg viewBox="0 0 720 300" width="100%" role="img" aria-label="FILL: describe team types and interactions for screen readers">
    <title>FILL: team topologies map</title>

    <!-- connectors first (under boxes) -->
    <g fill="none">
      <!-- facilitating: enabling team -> stream-aligned (dashed) -->
      <path d="M150,150 L280,110" stroke="#15803d" stroke-width="2" stroke-dasharray="6 5"/>
      <!-- collaboration: two stream-aligned teams (thick solid) -->
      <path d="M470,90 L560,90" stroke="#16203a" stroke-width="4"/>
      <!-- X-as-a-Service: stream-aligned -> platform (thin arrow) -->
      <defs><marker id="ttm-arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6677"/></marker></defs>
      <path d="M400,120 L400,200" stroke="#5b6677" stroke-width="1.5" marker-end="url(#ttm-arr)"/>
    </g>

    <!-- stream-aligned: wide blue bars -->
    <g>
      <rect x="280" y="70" width="180" height="44" rx="6" fill="#2563eb"/>
      <text x="370" y="90" text-anchor="middle" font-family="'Roboto',sans-serif" font-size="12" fill="#fff" font-weight="600">FILL: Stream-aligned A</text>
      <text x="370" y="105" text-anchor="middle" font-family="'Roboto Mono',monospace" font-size="9" fill="#dbe6ff">e.g. Checkout</text>

      <rect x="560" y="70" width="150" height="44" rx="6" fill="#2563eb"/>
      <text x="635" y="90" text-anchor="middle" font-family="'Roboto',sans-serif" font-size="12" fill="#fff" font-weight="600">FILL: Stream-aligned B</text>
      <text x="635" y="105" text-anchor="middle" font-family="'Roboto Mono',monospace" font-size="9" fill="#dbe6ff">e.g. Search</text>
    </g>

    <!-- platform: tall dark block underneath -->
    <g>
      <rect x="280" y="200" width="430" height="60" rx="6" fill="#1e3a8a"/>
      <text x="495" y="226" text-anchor="middle" font-family="'Roboto',sans-serif" font-size="12" fill="#fff" font-weight="600">FILL: Platform team</text>
      <text x="495" y="244" text-anchor="middle" font-family="'Roboto Mono',monospace" font-size="9" fill="#c7d3f5">self-service internal platform</text>
    </g>

    <!-- enabling: green rounded box -->
    <g>
      <rect x="30" y="126" width="120" height="48" rx="14" fill="#e9f6ee" stroke="#15803d" stroke-width="1.5"/>
      <text x="90" y="147" text-anchor="middle" font-family="'Roboto',sans-serif" font-size="12" fill="#15803d" font-weight="600">FILL: Enabling</text>
      <text x="90" y="162" text-anchor="middle" font-family="'Roboto Mono',monospace" font-size="9" fill="#15803d">e.g. SRE guild</text>
    </g>

    <!-- complicated-subsystem: amber octagonal box -->
    <g>
      <polygon points="30,210 40,200 130,200 140,210 140,250 130,260 40,260 30,250"
               fill="#fdf3e7" stroke="#b45309" stroke-width="1.5"/>
      <text x="85" y="228" text-anchor="middle" font-family="'Roboto',sans-serif" font-size="11.5" fill="#b45309" font-weight="600">FILL: Complicated-</text>
      <text x="85" y="243" text-anchor="middle" font-family="'Roboto',sans-serif" font-size="11.5" fill="#b45309" font-weight="600">subsystem</text>
    </g>
  </svg>

  <div style="margin-top:14px;font-family:'Roboto Mono',monospace;font-size:10px;color:#5b6677;display:flex;gap:16px;flex-wrap:wrap;">
    <span><span style="display:inline-block;width:12px;height:8px;background:#2563eb;vertical-align:middle;"></span> stream-aligned</span>
    <span><span style="display:inline-block;width:12px;height:8px;background:#1e3a8a;vertical-align:middle;"></span> platform</span>
    <span><span style="display:inline-block;width:12px;height:8px;background:#e9f6ee;border:1px solid #15803d;vertical-align:middle;"></span> enabling</span>
    <span><span style="display:inline-block;width:12px;height:8px;background:#fdf3e7;border:1px solid #b45309;vertical-align:middle;"></span> complicated-subsystem</span>
    <br>
    <span><svg width="26" height="8" style="vertical-align:middle;"><line x1="0" y1="4" x2="26" y2="4" stroke="#16203a" stroke-width="4"/></svg> collaboration</span>
    <span><svg width="26" height="8" style="vertical-align:middle;"><line x1="0" y1="4" x2="20" y2="4" stroke="#5b6677" stroke-width="1.5"/><path d="M20,1 L26,4 L20,7 Z" fill="#5b6677"/></svg> X-as-a-Service</span>
    <span><svg width="26" height="8" style="vertical-align:middle;"><line x1="0" y1="4" x2="26" y2="4" stroke="#15803d" stroke-width="2" stroke-dasharray="6 5"/></svg> facilitating</span>
  </div>
</div>
