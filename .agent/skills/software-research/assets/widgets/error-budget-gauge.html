<!--
  WIDGET: error-budget-gauge  (zero dependencies — inline SVG + ~25 lines vanilla JS)
  Use for: SLO error-budget remaining as a radial arc gauge. Big % in the center;
  the arc + a verdict band shift green -> amber -> red as the budget burns down.
  How: copy the whole block (markup + <script>). Set EBG_REMAINING (0..100 = %
  of error budget still available). Bands: >50 green "deploy freely",
  30-50 blue "normal", <30 amber "slow down", 0 red "freeze". Edit ebgBands() to
  retune. If you place two gauges on one page, give the ids a unique suffix (ebg2-*).
  Arc math: 270deg sweep from 135deg to 405deg; we compute the stroke-dasharray of
  a circle to fill the fraction. Prints fine (static after first paint). No CDN.
-->
<div class="ebg" style="border:1px solid #e4e9f2;border-radius:12px;padding:24px 28px;background:#f6f8fc;max-width:340px;">
  <h4 style="font-family:'Montserrat',sans-serif;font-size:15px;font-weight:700;margin:0 0 4px;color:#16203a;">FILL: SLO name (e.g. "Checkout 99.9%")</h4>
  <p style="font-size:13px;color:#5b6677;margin:0 0 12px;">FILL: window (e.g. "30-day rolling budget").</p>

  <svg viewBox="0 0 220 200" width="100%" role="img" aria-label="FILL: error budget remaining gauge">
    <title>FILL: error budget remaining</title>
    <!-- track: a 270deg arc. Circle r=86, circumference=540.35; 3/4 = 405.27 visible -->
    <circle cx="110" cy="105" r="86" fill="none" stroke="#e4e9f2" stroke-width="18"
            stroke-linecap="round" stroke-dasharray="405.27 135.09"
            transform="rotate(135 110 105)"/>
    <!-- value arc: dasharray set by JS -->
    <circle id="ebg-arc" cx="110" cy="105" r="86" fill="none" stroke="#15803d" stroke-width="18"
            stroke-linecap="round" stroke-dasharray="0 540.35"
            transform="rotate(135 110 105)"/>
    <!-- center readout -->
    <text id="ebg-pct" x="110" y="100" text-anchor="middle" font-family="'Montserrat',sans-serif"
          font-size="40" font-weight="800" fill="#16203a">—</text>
    <text x="110" y="122" text-anchor="middle" font-family="'Roboto Mono',monospace"
          font-size="10.5" letter-spacing="0.08em" fill="#5b6677">BUDGET LEFT</text>
    <text id="ebg-verdict" x="110" y="176" text-anchor="middle" font-family="'Montserrat',sans-serif"
          font-size="14" font-weight="700" fill="#15803d">—</text>
  </svg>
</div>
<script>
  // FILL: remaining error budget as a percentage (0..100).
  var EBG_REMAINING = 62;

  function ebgBands(p) {
    // returns { color, label } for the arc + verdict
    if (p <= 0)  return { color: '#b91c1c', label: 'FREEZE' };
    if (p < 30)  return { color: '#b45309', label: 'SLOW DOWN' };
    if (p <= 50) return { color: '#2563eb', label: 'NORMAL' };
    return { color: '#15803d', label: 'DEPLOY FREELY' };
  }
  function ebgUpdate() {
    var p = Math.max(0, Math.min(100, EBG_REMAINING));
    var arcLen = 405.27;                 // length of the 270deg visible track
    var filled = arcLen * (p / 100);
    var b = ebgBands(p);
    var arc = document.getElementById('ebg-arc');
    arc.setAttribute('stroke-dasharray', filled + ' ' + (540.35 - filled));
    arc.setAttribute('stroke', b.color);
    document.getElementById('ebg-pct').textContent = Math.round(p) + '%';
    var v = document.getElementById('ebg-verdict');
    v.textContent = b.label;
    v.setAttribute('fill', b.color);
  }
  ebgUpdate();
</script>
