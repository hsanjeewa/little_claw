<!--
  WIDGET: status-badge  (zero dependencies — pure HTML/CSS)
  Use for: small inline "label:value" pills — version, license, "recommended",
  maturity, coverage%. Drop them inline in prose or as a row under a heading.
  How: copy the pills you need. Replace FILL markers. Each pill is one <span>;
  pick a color role by intent (they map to the briefing palette):
    neutral → bg #f6f8fc  border #e4e9f2  text #16203a  (facts: version, license)
    good    → bg #e9f6ee  border #cfe9d8  text #15803d  (recommended, high coverage)
    warn    → bg #fdf3e7  border #f5e0c3  text #b45309  (caution, aging)
    bad     → bg #fdecec  border #f6cfcf  text #b91c1c  (deprecated, EOL)
    info    → bg #eef4ff  border #d4e2fb  text #1e3a8a  (maturity, meta)
  The label word carries meaning alongside color. Prints fine (static).
-->
<div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-family:'Roboto',sans-serif;">
  <!-- neutral: version -->
  <span style="display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;background:#f6f8fc;border:1px solid #e4e9f2;font-family:'Roboto Mono',monospace;font-size:11.5px;color:#16203a;">
    <span style="text-transform:uppercase;letter-spacing:0.06em;font-size:9.5px;color:#5b6677;">FILL: version</span><b>2.4.1</b>
  </span>
  <!-- neutral: license -->
  <span style="display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;background:#f6f8fc;border:1px solid #e4e9f2;font-family:'Roboto Mono',monospace;font-size:11.5px;color:#16203a;">
    <span style="text-transform:uppercase;letter-spacing:0.06em;font-size:9.5px;color:#5b6677;">FILL: license</span><b>MIT</b>
  </span>
  <!-- good: recommended -->
  <span style="display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;background:#e9f6ee;border:1px solid #cfe9d8;font-family:'Roboto Mono',monospace;font-size:11.5px;color:#15803d;font-weight:700;">
    ✓ FILL: Recommended
  </span>
  <!-- info: maturity -->
  <span style="display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;background:#eef4ff;border:1px solid #d4e2fb;font-family:'Roboto Mono',monospace;font-size:11.5px;color:#1e3a8a;">
    <span style="text-transform:uppercase;letter-spacing:0.06em;font-size:9.5px;color:#5b6677;">FILL: maturity</span><b>Stable</b>
  </span>
  <!-- good: coverage % -->
  <span style="display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;background:#e9f6ee;border:1px solid #cfe9d8;font-family:'Roboto Mono',monospace;font-size:11.5px;color:#15803d;">
    <span style="text-transform:uppercase;letter-spacing:0.06em;font-size:9.5px;color:#5b6677;">FILL: coverage</span><b>92%</b>
  </span>
  <!-- warn / bad examples (delete if unused) -->
  <span style="display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;background:#fdecec;border:1px solid #f6cfcf;font-family:'Roboto Mono',monospace;font-size:11.5px;color:#b91c1c;font-weight:700;">
    ✗ FILL: Deprecated
  </span>
</div>
